<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Limbo - Juego</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barriecito&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <!-- Background Clouds -->
    <div class="nubes-fondo" id="nubes-container"></div>

    <div class="game-container">
        <!-- Top Status Bars -->
        <div class="status-container">
            <div class="status-col">
                <div class="pred-indicator" id="pred-health">▲</div>
                <span class="status-label">Health</span>
                <div class="status-bar-bg"><div class="status-bar-fill" id="bar-health" style="width: 50%;"></div></div>
            </div>
            <div class="status-col">
                <div class="pred-indicator" id="pred-economy">▲</div>
                <span class="status-label">Economy</span>
                <div class="status-bar-bg"><div class="status-bar-fill" id="bar-economy" style="width: 50%;"></div></div>
            </div>
            <div class="status-col">
                <div class="pred-indicator" id="pred-hope">▲</div>
                <span class="status-label">Hope</span>
                <div class="status-bar-bg"><div class="status-bar-fill" id="bar-hope" style="width: 50%;"></div></div>
            </div>
            <div class="status-col">
                <div class="pred-indicator" id="pred-security">▲</div>
                <span class="status-label">Security</span>
                <div class="status-bar-bg"><div class="status-bar-fill" id="bar-security" style="width: 50%;"></div></div>
            </div>
        </div>

        <!-- Milestones -->
        <div class="milestones-container">
            <div class="milestone-icon" id="ms-work">
                <svg viewBox="0 0 100 100" style="width:24px;height:24px;"><rect x="20" y="40" width="60" height="40" rx="5" fill="none" stroke="currentColor" stroke-width="6"/><path d="M40 40 L40 25 L60 25 L60 40" fill="none" stroke="currentColor" stroke-width="6"/></svg>
            </div>
            <div class="milestone-line"></div>
            <div class="milestone-icon" id="ms-court">
                <svg viewBox="0 0 100 100" style="width:24px;height:24px;"><path d="M50 20 L50 80 M20 40 L80 40 M30 40 L30 60 Q50 80 70 60 L70 40" fill="none" stroke="currentColor" stroke-width="6"/></svg>
            </div>
            <div class="milestone-line"></div>
            <div class="milestone-icon" id="ms-greencard">
                <svg viewBox="0 0 100 100" style="width:24px;height:24px;"><rect x="20" y="30" width="60" height="40" rx="5" fill="none" stroke="currentColor" stroke-width="6"/><circle cx="35" cy="50" r="8" fill="currentColor"/><line x1="50" y1="45" x2="70" y2="45" stroke="currentColor" stroke-width="4"/><line x1="50" y1="55" x2="70" y2="55" stroke="currentColor" stroke-width="4"/></svg>
            </div>
            <div class="milestone-line"></div>
            <div class="milestone-icon" id="ms-citizen">
                <svg viewBox="0 0 100 100" style="width:24px;height:24px;"><path d="M50 10 L60 40 L90 40 L65 60 L75 90 L50 70 L25 90 L35 60 L10 40 L40 40 Z" fill="none" stroke="currentColor" stroke-width="6" stroke-linejoin="round"/></svg>
            </div>
        </div>

        <!-- Main Card Area -->
        <div class="card-area" id="card-area">
            <div class="floating-wrapper" id="card-wrapper">
                <div class="card" id="active-card">
                    <div class="card-image-container" id="card-image">
                        <!-- SVG Image will be injected here -->
                    </div>
                    <div class="card-text-container">
                        <h3 id="card-title">Cargando...</h3>
                        <p id="card-desc">Conectando al sistema...</p>
                    </div>
                </div>
            </div>
            <div class="swipe-indicator left" id="swipe-left">◀ Rechazar</div>
            <div class="swipe-indicator right" id="swipe-right">Aceptar ▶</div>
        </div>
    </div>


    <!-- Years Counter -->
    <div class="years-counter" id="years-counter">Año 0</div>

    <!-- Admin Console Overlay -->
    <div class="admin-overlay" id="admin-overlay" style="display: none;">
        <div class="admin-console">
            <div class="admin-header">Admin Console</div>
            <div class="admin-log" id="admin-log">
                <div>[SYSTEM] Ingrese contraseña:</div>
            </div>
            <input type="text" class="admin-input" id="admin-input" autocomplete="off" autofocus>
        </div>
    </div>


    <!-- Outcome Overlay -->
    <div class="modal-oculto" id="modal-resultado">
        <div class="modal-contenido">
            <h2 class="titulo-settings" id="resultado-titulo">Resultado</h2>
            <p id="resultado-texto" style="text-align:center; font-family: system-ui; font-size: 1.2rem; line-height: 1.4;"></p>
            <button class="selector-idioma btn-opcion" id="btn-continuar" style="margin-top: 20px;">Continuar</button>
        </div>
    </div>

    <!-- GameOver Overlay -->
    <div class="modal-oculto fullscreen-white" id="modal-gameover">
        <div class="gameover-content gameover-layout">
            <div class="gameover-buttons">
                <div class="btn-circular" id="btn-restart">↻</div>
                <div class="btn-circular" id="btn-exit">X</div>
            </div>
        </div>
    </div>

    <!-- Victory Overlay -->
    <div class="modal-oculto" id="modal-victory">
        <div class="modal-contenido">
            <h2 class="titulo-settings">¡Sobreviviste!</h2>
            <p style="text-align:center; font-family: system-ui;">Lograste superar el limbo legal.</p>
            <button class="selector-idioma btn-opcion" id="btn-victory-restart" style="margin-top: 20px;">Jugar de Nuevo</button>
        </div>
    </div>

    <!-- Audio -->
    <audio id="bg-music" src="Liminal Save Screen.mp3" loop autoplay></audio>
    <audio id="click-sound" src="freesound_community-menu-selection-1022.wav"></audio>

    <!-- Scripts -->
    <script src="game.js"></script>
</body>
</html>
