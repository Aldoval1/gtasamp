<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Juego 2D - Escena de Inicio</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Barriecito&amp;display=swap" rel="stylesheet"/>
<link href="style.css" rel="stylesheet"/>
</head>
<body>
<!-- Contenedor del fondo animado (Nubes) -->
<div class="nubes-fondo" id="nubes-container"></div>
<!-- Contenedor del personaje (Video) -->
<h1 class="titulo-juego">OUR LIMBO</h1>
<div class="personaje-contenedor">
<!-- 'autoplay', 'loop', 'muted' y 'playsinline' aseguran que se reproduzca solo -->
<video autoplay="" class="personaje-video" loop="" muted="" playsinline="" src="cayendo.mp4"></video>
</div>
<!-- Contenedor de Botones -->
<div class="botones-contenedor">
<img alt="Play" class="boton-juego" src="playbutton.png"/>
<img alt="Settings" class="boton-juego" id="btn-settings" src="settingbutton.png"/>
</div>
<!-- Modal de Ajustes -->
<div class="modal-oculto" id="modal-settings">
<div class="modal-contenido">
<!-- As per the user, it is represented by cancel image in github files. -->
<div class="btn-cerrar" id="btn-cerrar-settings">X</div>
<h2 class="titulo-settings">Settings</h2>
</div>
</div>
<script>
        const nubesContainer = document.getElementById('nubes-container');

        function crearNube() {
            const nube = document.createElement('div');
            nube.classList.add('nube');

            // Tamaño aleatorio (escala de 0.5 a 1.5)
            const escala = Math.random() * 1 + 0.5;
            nube.style.transform = `scale(${escala})`;

            // Posición horizontal aleatoria (0% a 100%)
            const left = Math.random() * 100;
            nube.style.left = `${left}%`;

            // Velocidad aleatoria (3s a 8s)
            const duracion = Math.random() * 5 + 3;
            nube.style.animationDuration = `${duracion}s`;

            nubesContainer.appendChild(nube);

            // Eliminar la nube cuando termina su animación
            setTimeout(() => {
                nube.remove();
            }, duracion * 1000);
        }

        // Crear nubes periódicamente
        setInterval(crearNube, 800);

        // Crear algunas nubes iniciales con diferentes delays para que no empiecen todas abajo
        for(let i=0; i<5; i++) {
            setTimeout(crearNube, i * 400);
        }

        // Lógica del Modal de Settings
        const btnSettings = document.getElementById('btn-settings');
        const modalSettings = document.getElementById('modal-settings');
        const btnCerrarSettings = document.getElementById('btn-cerrar-settings');
        const mainElements = document.querySelectorAll('.nubes-fondo, .titulo-juego, .personaje-contenedor, .botones-contenedor');

        btnSettings.addEventListener('click', () => {
            modalSettings.classList.add('mostrar');
            mainElements.forEach(el => el.classList.add('blur-background'));
        });

        btnCerrarSettings.addEventListener('click', () => {
            modalSettings.classList.remove('mostrar');
            mainElements.forEach(el => el.classList.remove('blur-background'));
        });
</script>
</body>
</html>
